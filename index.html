<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Japan Population Change 1980–2020</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                font-family: Helvetica, Arial, sans-serif;
            }
            #map {
                height: 100vh;
                width: 100%;
            }
            .controls {
                position: absolute;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(255, 255, 255, 0.95);
                border-radius: 12px;
                padding: 16px 24px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                min-width: 320px;
            }
            .controls .year-label {
                font-size: 22px;
                font-weight: 700;
                color: #333;
            }
            .controls .row {
                display: flex;
                align-items: center;
                gap: 12px;
                width: 100%;
            }
            .controls input[type="range"] {
                flex: 1;
                cursor: pointer;
                height: 6px;
            }
            .controls button {
                background: #4285f4;
                color: #fff;
                border: none;
                border-radius: 6px;
                padding: 6px 14px;
                font-size: 15px;
                cursor: pointer;
                font-weight: 600;
                transition: background 0.2s;
            }
            .controls button:hover {
                background: #3367d6;
            }
            .legend {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 8px;
                padding: 10px 14px;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
                font-size: 13px;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .legend .grad {
                display: flex;
                align-items: center;
                gap: 2px;
                height: 16px;
            }
            .legend .grad span {
                width: 20px;
                height: 14px;
                display: inline-block;
            }
            .legend .labels {
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: #555;
            }
            .legend .title {
                font-weight: 600;
                margin-bottom: 2px;
            }
            #info {
                position: absolute;
                top: 20px;
                left: 20px;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 8px;
                padding: 10px 14px;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
                font-size: 13px;
                display: none;
                max-width: 280px;
                line-height: 1.4;
            }
            #info .name {
                font-weight: 700;
                font-size: 14px;
            }
            #info .jp {
                color: #666;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>

        <div id="info"></div>

        <div class="legend">
            <div class="title">Population Change</div>
            <div class="grad" id="gradientBar"></div>
            <div class="labels"><span>Decline</span><span>Growth</span></div>
        </div>

        <div class="controls">
            <div class="year-label" id="yearLabel">1980</div>
            <div class="row">
                <button id="prevBtn">◀</button>
                <input
                    type="range"
                    id="yearSlider"
                    min="0"
                    max="8"
                    value="0"
                    step="1"
                />
                <button id="nextBtn">▶</button>
            </div>
        </div>

        <script>
            const YEARS = [
                1980, 1985, 1990, 1995, 2000, 2005, 2010, 2015, 2020,
            ];

            // ---------- Build gradient legend ----------
            (function () {
                const bar = document.getElementById("gradientBar");
                const steps = 20;
                for (let i = 0; i < steps; i++) {
                    const t = i / (steps - 1); // 0 → 1
                    const rate = (t - 0.5) * 2; // -1 → 1
                    const span = document.createElement("span");
                    span.style.backgroundColor = colorForRate(rate);
                    bar.appendChild(span);
                }
                // Add percentage labels below the bar
                const lbl = document.createElement("div");
                lbl.style.cssText =
                    "display:flex;justify-content:space-between;font-size:11px;color:#555;margin-top:2px";
                lbl.innerHTML =
                    "<span>&minus;10%</span><span>0%</span><span>+10%</span>";
                bar.parentNode.appendChild(lbl);
            })();

            function colorForRate(rate) {
                // rate in [-1, 1]  –  negative=red, positive=green, 0=white
                const abs = Math.abs(rate);
                if (rate > 0) {
                    // green: (255,255,255) → (0,180,0)
                    const r = Math.round(255 - abs * 255);
                    const g = Math.round(255 - abs * 75);
                    const b = Math.round(255 - abs * 255);
                    return `rgb(${r},${g},${b})`;
                } else if (rate < 0) {
                    // red:   (255,255,255) → (200,0,0)
                    const r = Math.round(255 - abs * 55);
                    const g = Math.round(255 - abs * 255);
                    const b = Math.round(255 - abs * 255);
                    return `rgb(${r},${g},${b})`;
                }
                return "#ffffff";
            }

            // ---------- Load CSV ----------
            let popData = {}; // code -> {1980,1985,…,2010}
            let csvLoaded = false;

            async function loadCSV() {
                const resp = await fetch("built_pop_wide_en_jp.csv");
                const text = await resp.text();
                const lines = text.trim().split("\n");
                const headers = lines[0].split(",");
                const yearCols = {};
                for (let i = 0; i < headers.length; i++) {
                    const m = headers[i].match(/totalpop(\d{4})/);
                    if (m) yearCols[parseInt(m[1])] = i;
                }
                for (let r = 1; r < lines.length; r++) {
                    // handle quoted fields properly
                    const vals = parseCSVLine(lines[r]);
                    const code = parseInt(vals[0]);
                    const entry = {};
                    for (const yr of YEARS) {
                        entry[yr] = parseFloat(vals[yearCols[yr]]);
                    }
                    entry._name_en = vals[1];
                    entry._name_jp = vals[2];
                    popData[code] = entry;
                }
                csvLoaded = true;
            }

            function parseCSVLine(line) {
                const result = [];
                let cur = "";
                let inQ = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (inQ) {
                        if (ch === '"') {
                            if (i + 1 < line.length && line[i + 1] === '"') {
                                cur += '"';
                                i++;
                            } else inQ = false;
                        } else cur += ch;
                    } else {
                        if (ch === '"') inQ = true;
                        else if (ch === ",") {
                            result.push(cur);
                            cur = "";
                        } else cur += ch;
                    }
                }
                result.push(cur);
                return result;
            }

            // ---------- Load GeoJSON ----------
            let geoLayer = null;
            let allFeatures = []; // {geojson, muniCode}
            let geoLoaded = false;
            let currentCode = null; // hovered/previously selected

            async function loadAllGeoJSON(map) {
                const codes = [];
                for (let i = 1; i <= 47; i++) codes.push(i);
                const promises = codes.map((pref) => {
                    const p = ("0" + pref).slice(-2);
                    return fetch(`simplify-japan-geojson/GeoJson/${p}.json`)
                        .then((r) => r.json())
                        .catch(() => null);
                });
                const results = await Promise.all(promises);
                for (const geo of results) {
                    if (!geo || !geo.features) continue;
                    for (const feat of geo.features) {
                        const codeStr = feat.properties.N03_007;
                        if (!codeStr) continue;
                        const muniCode = parseInt(codeStr);
                        allFeatures.push({ fe: feat, code: muniCode, codeStr });
                    }
                }
                const combined = {
                    type: "FeatureCollection",
                    features: allFeatures.map((f) => f.fe),
                };
                geoLayer = L.geoJSON(combined, {
                    style: () => featureStyle(null),
                    onEachFeature: (feat, layer) => {
                        const codeStr = feat.properties.N03_007;
                        const muniCode = parseInt(codeStr);
                        layer.muniCode = muniCode;
                        layer.on("mouseover", function (e) {
                            showInfo(e, muniCode);
                            currentCode = muniCode;
                        });
                        layer.on("mouseout", function () {
                            document.getElementById("info").style.display =
                                "none";
                            currentCode = null;
                        });
                    },
                }).addTo(map);
                geoLoaded = true;
            }

            let sliderIdx = 0;

            /** Return the previous census year, or null if yr is 1980 */
            function prevYear(yr) {
                const i = YEARS.indexOf(yr);
                if (i <= 0) return null;
                return YEARS[i - 1];
            }

            function calcColor(muniCode, yr) {
                if (yr === 1980) return "#ffffff";
                const entry = popData[muniCode];
                if (!entry) return "#eeeeee";
                const prev = prevYear(yr);
                if (!prev) return "#ffffff";
                const popPrev = entry[prev];
                const popCur = entry[yr];
                if (popPrev == null || popPrev === 0) return "#eeeeee";
                const rate = (popCur - popPrev) / popPrev;
                const clamped = Math.max(-0.1, Math.min(0.1, rate));
                return colorForRate(clamped / 0.1);
            }

            function featureStyle(muniCode) {
                const yr = YEARS[sliderIdx];
                return {
                    fillColor: calcColor(muniCode, yr),
                    color: "#666",
                    weight: 0.5,
                    fillOpacity: 0.85,
                };
            }

            function updateMap() {
                if (!geoLayer) return;
                const yr = YEARS[sliderIdx];
                document.getElementById("yearLabel").textContent = yr;

                geoLayer.eachLayer(function (layer) {
                    layer.setStyle({
                        fillColor: calcColor(layer.muniCode, yr),
                        color: "#666",
                        weight: 0.5,
                        fillOpacity: 0.85,
                    });
                });
            }

            function showInfo(e, muniCode) {
                const entry = popData[muniCode];
                if (!entry) return;
                const el = document.getElementById("info");
                const yr = YEARS[sliderIdx];
                const pop = entry[yr];
                const prev = prevYear(yr);
                let change = "";
                if (prev != null) {
                    const popPrev = entry[prev];
                    if (popPrev && popPrev !== 0) {
                        const pct = (((pop - popPrev) / popPrev) * 100).toFixed(
                            1,
                        );
                        const sign = pct >= 0 ? "+" : "";
                        change = `<br>Change from ${prev}: ${sign}${pct}%`;
                    }
                }
                el.innerHTML = `
    <div class="name">${entry._name_en}</div>
    <div class="jp">${entry._name_jp}</div>
    <div>Population ${yr}: <b>${pop.toLocaleString()}</b>${change}</div>
  `;
                el.style.display = "block";
            }

            // ---------- Init map ----------
            async function init() {
                const map = L.map("map").setView([37.5, 137.5], 6);
                L.tileLayer(
                    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                    {
                        maxZoom: 10,
                        minZoom: 5,
                        attribution:
                            '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
                    },
                ).addTo(map);

                await Promise.all([loadCSV(), loadAllGeoJSON(map)]);
                updateMap();

                const slider = document.getElementById("yearSlider");
                slider.addEventListener("input", function () {
                    sliderIdx = parseInt(this.value);
                    updateMap();
                    if (currentCode) {
                        // fake a mouseover
                        const entry = popData[currentCode];
                        if (entry) showInfo(null, currentCode);
                    }
                });

                document
                    .getElementById("prevBtn")
                    .addEventListener("click", function () {
                        if (sliderIdx > 0) {
                            sliderIdx--;
                            slider.value = sliderIdx;
                            updateMap();
                        }
                    });
                document
                    .getElementById("nextBtn")
                    .addEventListener("click", function () {
                        if (sliderIdx < 8) {
                            sliderIdx++;
                            slider.value = sliderIdx;
                            updateMap();
                        }
                    });
            }

            init();
        </script>
    </body>
</html>
