<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hollow Japan 日本空洞化 2D</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <link rel="stylesheet" href="css/common.css" />
        <link rel="stylesheet" href="css/2d.css" />
    </head>
    <body>
        <div id="map"></div>

        <div id="info"></div>

        <div class="legend">
            <div class="map-title-row">
                <span class="title-main" id="mainTitle">Hollow Japan</span>
                <div class="title-toggles">
                    <a href="#" class="toggle-link" id="langToggle">日本語</a>
                    <span class="toggle-sep">|</span>
                    <a href="3d.html" class="toggle-link" id="viewToggle">3D</a>
                </div>
            </div>
            <div class="grad" id="gradientBar"></div>
            <div class="pct-labels" id="pctLabels"></div>
            <div class="mode-toggle" id="modeToggle">
                <button
                    class="mode-btn active"
                    id="modeSince1980"
                    data-mode="since1980"
                >
                    Since 1980
                </button>
                <button class="mode-btn" id="mode5yr" data-mode="5year">
                    Last 5 years
                </button>
            </div>
            <div class="controls">
                <div class="row">
                    <span class="year-label" id="yearLabel">1980</span>
                    <button id="playBtn">⏸</button>
                    <input
                        type="range"
                        id="yearSlider"
                        min="0"
                        max="70"
                        value="0"
                        step="1"
                    />
                </div>
            </div>
        </div>

        <script type="module" src="js/2d.js"></script>
    </body>
</html>
