<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Japan Population Change 1980–2020</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                font-family: Helvetica, Arial, sans-serif;
            }
            #map {
                height: 100vh;
                width: 100%;
            }
            .controls {
                position: absolute;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(255, 255, 255, 0.95);
                border-radius: 12px;
                padding: 16px 24px;
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                min-width: 320px;
            }
            .controls .year-label {
                font-size: 22px;
                font-weight: 700;
                color: #333;
            }
            .controls .row {
                display: flex;
                align-items: center;
                gap: 12px;
                width: 100%;
            }
            .controls input[type="range"] {
                flex: 1;
                cursor: pointer;
                height: 6px;
            }
            .controls button {
                background: #777;
                color: #fff;
                border: none;
                border-radius: 6px;
                padding: 6px 14px;
                font-size: 15px;
                cursor: pointer;
                font-weight: 600;
                transition: background 0.2s;
            }
            .controls button:hover {
                background: #999;
            }
            .legend {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 8px;
                padding: 10px 14px;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
                font-size: 13px;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .legend .grad {
                display: flex;
                align-items: center;
                gap: 2px;
                height: 16px;
            }
            .legend .grad span {
                width: 20px;
                height: 14px;
                display: inline-block;
            }
            .legend .labels {
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: #555;
            }
            .legend .title {
                font-weight: 600;
                margin-bottom: 2px;
            }
            #info {
                position: absolute;
                top: 170px;
                right: 20px;
                left: auto;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.9);
                border-radius: 8px;
                padding: 10px 14px;
                box-shadow: 0 1px 6px rgba(0, 0, 0, 0.2);
                font-size: 13px;
                display: none;
                max-width: 280px;
                line-height: 1.4;
            }
            #info .name {
                font-weight: 700;
                font-size: 14px;
            }
            #info .jp {
                color: #666;
                font-size: 12px;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>

        <div id="info"></div>

        <div class="legend">
            <div class="title">Population Change</div>
            <div class="grad" id="gradientBar"></div>
            <div class="labels"><span>Decline</span><span>Growth</span></div>
        </div>

        <div class="controls">
            <div class="year-label" id="yearLabel">1980</div>
            <div class="row">
                <button id="playBtn">⏸</button>
                <button id="prevBtn">◀</button>
                <input
                    type="range"
                    id="yearSlider"
                    min="0"
                    max="70"
                    value="0"
                    step="1"
                />
                <button id="nextBtn">▶</button>
            </div>
        </div>

        <script type="module" src="js/2d.js"></script>
    </body>
</html>
