<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Japan Population Change 1980–2020</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <link rel="stylesheet" href="css/common.css" />
        <link rel="stylesheet" href="css/2d.css" />
    </head>
    <body>
        <div id="map"></div>

        <div id="info"></div>

        <div class="legend">
            <div class="map-title-row">
                <span class="title-jp">消滅図</span>
                <span class="title-en">Vanishing Japan</span>
            </div>
            <div class="grad" id="gradientBar"></div>
            <div class="labels" id="gradLabels">
                <span>Decline</span><span>Growth</span>
            </div>
            <div class="pct-labels" id="pctLabels"></div>
            <div class="mode-toggle" id="modeToggle">
                <button class="mode-btn active" id="mode5yr" data-mode="5year">
                    Last 5 years
                </button>
                <button
                    class="mode-btn"
                    id="modeSince1980"
                    data-mode="since1980"
                >
                    Since 1980
                </button>
            </div>
        </div>

        <div class="controls">
            <div class="row">
                <span class="year-label" id="yearLabel">1980</span>
                <button id="playBtn">⏸</button>
                <input
                    type="range"
                    id="yearSlider"
                    min="0"
                    max="70"
                    value="0"
                    step="1"
                />
            </div>
        </div>

        <script type="module" src="js/2d.js"></script>
    </body>
</html>
