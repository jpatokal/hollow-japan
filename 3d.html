<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hollow Japan 日本空洞化 3D</title>
        <link rel="stylesheet" href="css/common.css" />
        <link rel="stylesheet" href="css/3d.css" />
    </head>
    <body>
        <div id="loading">
            <div>Loading … <span id="loadCount">0</span> / 47</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div id="canvas-container"></div>

        <div id="info"></div>

        <div id="camInfo" style="display: none">
            <span class="hint-toggle">?</span>
            <div class="controls-hint">
                <span class="hint-row" id="hintRotate"
                    ><b>rotate</b> one finger / drag</span
                >
                <span class="hint-row" id="hintMove"
                    ><b>move</b> two fingers / shift-drag / WASD</span
                >
                <span class="hint-row" id="hintZoom"
                    ><b>zoom</b> pinch / scroll / E,Q</span
                >
            </div>
            <div class="cam-coords"></div>
        </div>

        <div class="legend" style="display: none">
            <div class="map-title-row">
                <span class="title-main" id="mainTitle">Hollow Japan</span>
                <div class="title-toggles">
                    <a href="#" class="toggle-link" id="langToggle">日本語</a>
                    <span class="toggle-sep">|</span>
                    <a href="index.html" class="toggle-link" id="viewToggle"
                        >2D</a
                    >
                </div>
            </div>
            <div class="grad" id="gradientBar"></div>
            <div class="pct-labels" id="pctLabels"></div>
            <div class="mode-toggle" id="modeToggle">
                <button
                    class="mode-btn active"
                    id="modeSince1980"
                    data-mode="since1980"
                >
                    Since 1980
                </button>
                <button class="mode-btn" id="mode5yr" data-mode="5year">
                    Last 5 years
                </button>
            </div>
            <div class="controls">
                <div class="row">
                    <span class="year-label" id="yearLabel">1980</span>
                    <button id="playBtn">⏸</button>
                    <input
                        type="range"
                        id="yearSlider"
                        min="0"
                        max="70"
                        value="0"
                        step="1"
                    />
                </div>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module" src="js/3d.js"></script>
    </body>
</html>
