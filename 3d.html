<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Japan Population 3D 1980–2020</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                font-family: Helvetica, Arial, sans-serif;
                overflow: hidden;
                background: #1a1a2e;
            }
            #canvas-container {
                width: 100vw;
                height: 100vh;
                display: block;
            }
            /* ---- UI overlay ---- */
            .controls {
                position: absolute;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 10;
                background: rgba(20, 20, 40, 0.88);
                border-radius: 12px;
                padding: 14px 22px;
                box-shadow: 0 2px 16px rgba(0, 0, 0, 0.5);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                min-width: 340px;
                backdrop-filter: blur(6px);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .controls .year-label {
                font-size: 20px;
                font-weight: 700;
                color: #e0e0f0;
                letter-spacing: 0.5px;
            }
            .controls .row {
                display: flex;
                align-items: center;
                gap: 12px;
                width: 100%;
            }
            .controls input[type="range"] {
                flex: 1;
                cursor: pointer;
                height: 5px;
                accent-color: #6a8cff;
            }
            .controls button {
                background: #3a4a8a;
                color: #e0e0f0;
                border: none;
                border-radius: 6px;
                padding: 5px 14px;
                font-size: 14px;
                cursor: pointer;
                font-weight: 600;
                transition: background 0.2s;
            }
            .controls button:hover {
                background: #5a6aaa;
            }
            .legend {
                position: absolute;
                bottom: 100px;
                right: 20px;
                z-index: 10;
                background: rgba(20, 20, 40, 0.85);
                border-radius: 8px;
                padding: 10px 14px;
                box-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(6px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                color: #c0c0d0;
                font-size: 12px;
                display: flex;
                flex-direction: column;
                gap: 3px;
            }
            .legend .title {
                font-weight: 600;
                margin-bottom: 2px;
                color: #e0e0f0;
            }
            .legend .grad {
                display: flex;
                align-items: center;
                gap: 2px;
                height: 14px;
            }
            .legend .grad span {
                width: 18px;
                height: 12px;
                display: inline-block;
            }
            .legend .labels {
                display: flex;
                justify-content: space-between;
                font-size: 10px;
                color: #9090a0;
            }
            .legend .height-note {
                font-size: 10px;
                color: #8080a0;
                margin-top: 2px;
                font-style: italic;
            }
            #info {
                position: absolute;
                top: 20px;
                left: 20px;
                z-index: 10;
                background: rgba(20, 20, 40, 0.88);
                border-radius: 8px;
                padding: 10px 14px;
                box-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(6px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                color: #d0d0e0;
                font-size: 13px;
                display: none;
                max-width: 300px;
                line-height: 1.4;
                pointer-events: none;
            }
            #info .name {
                font-weight: 700;
                font-size: 14px;
                color: #f0f0ff;
            }
            #info .jp {
                color: #9090b0;
                font-size: 12px;
            }
            #info .height-label {
                color: #8080d0;
                font-size: 11px;
                margin-top: 2px;
            }
            #camInfo {
                position: absolute;
                bottom: 100px;
                left: 20px;
                z-index: 10;
                background: rgba(20, 20, 40, 0.75);
                border-radius: 6px;
                padding: 6px 10px;
                backdrop-filter: blur(4px);
                border: 1px solid rgba(255, 255, 255, 0.06);
                font-family: monospace;
                font-size: 11px;
                color: #707090;
                line-height: 1.5;
                pointer-events: none;
            }
            #camInfo .val {
                color: #a0a0c0;
            }
            #loading {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                color: #c0c0d0;
                font-size: 16px;
                font-family: Helvetica, Arial, sans-serif;
                text-align: center;
            }
            #loading .progress-track {
                width: 200px;
                height: 4px;
                background: rgba(255, 255, 255, 0.12);
                border-radius: 2px;
                margin-top: 8px;
                overflow: hidden;
            }
            #loading .progress-fill {
                width: 0%;
                height: 100%;
                background: #6a8cff;
                border-radius: 2px;
                transition: width 0.2s;
            }
        </style>
    </head>
    <body>
        <div id="loading">
            <div>Loading … <span id="loadCount">0</span> / 47</div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div id="canvas-container"></div>

        <div id="info"></div>

        <div id="camInfo"></div>

        <div class="legend">
            <div class="title">Population Change</div>
            <div class="grad" id="gradientBar"></div>
            <div class="labels"><span>Decline</span><span>Growth</span></div>
            <div class="height-note">Height ∝ ∛Population</div>
        </div>

        <div class="controls">
            <div class="year-label" id="yearLabel">1980</div>
            <div class="row">
                <button id="playBtn">⏸</button>
                <button id="prevBtn">◀</button>
                <input
                    type="range"
                    id="yearSlider"
                    min="0"
                    max="70"
                    value="0"
                    step="1"
                />
                <button id="nextBtn">▶</button>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module" src="js/3d.js"></script>
    </body>
</html>
